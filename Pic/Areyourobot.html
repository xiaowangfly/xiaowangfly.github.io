  <h2>请输入验证码以获取领取资源的资格</h2>
  <style>
    .captcha-container {
        flex-direction: column;
        margin-top: 50px;
    }
    .captcha-input {
        height: 43px;
        font-size: 20px;
        margin-bottom: 10px;
    }
    .captcha-canvas {
        border: 1px solid #ccc;
        border-radius: 5px;
        cursor: pointer;
    }
    .captcha-button {
        margin-top: 10px;
    }
</style>
    <div class="captcha-container">
        <input type="text" id="text" class="captcha-input" placeholder="请输入验证码(纯数字)"><br>
        <canvas id="canvas" class="captcha-canvas" width="200" height="72" onclick="dj()"></canvas><br>
        <button class="captcha-button" onclick="sublim()">提交</button>
    </div>
    <script type="text/javascript" src="base64.js"></script>
    <script>
        var show_num = [];
        draw(show_num);

        function dj() {
            draw(show_num);
        }
        var b = new Base64();
        function sublim() {
            var val = document.getElementById("text").value;
            var num = show_num.join("");
            if (val === '') {
                alert('请输入验证码！');
            } else if (val === " ") {
                //alert('提交成功！');
                //window.location.href=b.decode("L1F1aWNrQW5zd2VyL1F1aWNrQW5zd2VyL01hdGguaHRtbA==");//M
                //window.location.href=b.decode("L1F1aWNrQW5zd2VyL1F1aWNrQW5zd2VyL0VuZ2xpc2guaHRtbA==");//E
                //alert("傻逼");
                //window.location.href = "./xiaowangtalk/index.html";
                window.location.href = b.decode("Li9pbmRleC5odG1s");
                document.getElementById("text").value = '';
                draw(show_num);
            } else {
                alert('验证码错误！请重新输入。');
                //alert("你不是人？");
                document.getElementById("text").value = '';
                draw(show_num);
            }
        }

        function draw(show_num) {
            var canvas = document.getElementById("canvas");
            var context = canvas.getContext("2d");
            var canvas_width = canvas.width;
            var canvas_height = canvas.height;

            canvas.width = canvas_width;
            canvas.height = canvas_height;

            var sCode = "1,2,3,4,5,6,7,8,9,0";
            var aCode = sCode.split(",");
            var aLength = aCode.length;

            context.clearRect(0, 0, canvas_width, canvas_height);

            for (var i = 0; i < 4; i++) {
                var j = Math.floor(Math.random() * aLength);
                var deg = Math.random() * 30 * Math.PI / 180;
                var txt = aCode[j];
                show_num[i] = txt;
                var x = 20 + i * 45;
                var y = 40 + Math.random() * 8;
                context.font = "bold 50px 微软雅黑";

                context.save();
                context.translate(x, y);
                context.rotate(deg);
                context.fillStyle = randomColor();
                context.fillText(txt, 0, 0);
                context.restore();
            }

            for (var i = 0; i < 200; i++) {
                context.strokeStyle = randomColor();
                context.beginPath();
                context.moveTo(Math.random() * canvas_width, Math.random() * canvas_height);
                context.lineTo(Math.random() * canvas_width, Math.random() * canvas_height);
                context.stroke();
            }

            for (var i = 0; i < 5000; i++) {
                context.strokeStyle = randomColor();
                context.beginPath();
                var x = Math.random() * canvas_width;
                var y = Math.random() * canvas_height;
                context.moveTo(x, y);
                context.lineTo(x + 1, y + 1);
                context.stroke();
            }
        }

        function randomColor() {
            var r = Math.floor(Math.random() * 256);
            var g = Math.floor(Math.random() * 256);
            var b = Math.floor(Math.random() * 256);
            return "rgb(" + r + "," + g + "," + b + ")";
        }
    </script>
